name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .
